hf_token: ""  # 请在运行前填写你的 HuggingFace token，或通过环境变量 HF_TOKEN 传入
model_name: Qwen/Qwen2.5-1.5B-Instruct
output_dir: outputs/sft
max_seq_length: 2048
load_in_4bit: true
seed: 42
lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
train:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_steps: 50
  max_steps: 50
  learning_rate: 0.0002
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  fp16: false
  bf16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  group_by_length: true
  packing: true
dataset_path: data/processed/sft_train.json
datasets:
- name: AI-MO/NuminaMath-CoT
  split: train
  max_samples: 50000
- name: Magpie-Align/Magpie-Reasoning-150K
  split: train
  max_samples: 50000
