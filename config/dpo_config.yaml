model_name: Qwen/Qwen2.5-1.5B-Instruct
base_adapter_path: outputs/sft
output_dir: outputs/dpo
max_seq_length: 1536
load_in_4bit: true
seed: 42
beta: 0.3
dataset:
  name: microsoft/orca-math-word-problems-200k
  split: train
  max_samples: 50000
lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
train:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  warmup_steps: 80
  max_steps: 800
  learning_rate: 3.0e-06
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  weight_decay: 0.0
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  fp16: false
  bf16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
dataset_path: data/processed/dpo_train.json
