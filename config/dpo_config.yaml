model_name: Qwen/Qwen2.5-1.5B-Instruct
base_adapter_path: outputs/sft
output_dir: outputs/dpo
max_seq_length: 2048
load_in_4bit: true
seed: 42
beta: 0.1
lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
train:
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_steps: 50
  max_steps: 800
  learning_rate: 1.0e-05
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  weight_decay: 0.0
  lr_scheduler_type: cosine
  optim: paged_adamw_8bit
  fp16: false
  bf16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
dataset_path: data/processed/dpo_train.json
