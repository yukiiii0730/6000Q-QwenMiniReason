evaluation:
  output_dir: logs/open_model_benchmarks
  gsm8k_max_samples: 50
  bbh_subset: boolean_expressions
  bbh_max_samples: 50
  load_in_4bit: true

# run_train.sh 中 Step 0b（7B / 14B 参考模型）会使用此 API 配置。
# API Key 请在 .env 中配置 DASHSCOPE_API_KEY（参考 .env.example）。
api_evaluation:
  api_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  timeout: 90
  max_retries: 4

  reference_models:
    model_7b:
      label: Qwen2.5-7B-Instruct
      model: qwen2.5-7b-instruct
    model_14b:
      label: Qwen2.5-14B-Instruct
      model: qwen2.5-14b-instruct

models:
  - label: Qwen2.5-7B-Instruct
    model_path: Qwen/Qwen2.5-7B-Instruct
    note: 同家族 7B 对照，适合和 1.5B 微调模型做横向比较

  - label: Qwen2.5-14B-Instruct
    model_path: Qwen/Qwen2.5-14B-Instruct
    note: 接近 15B 量级的同家族对照，适合展示更大模型上限